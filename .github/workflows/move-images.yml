name: Move images into catalog assets

on:
  push:
    paths:
      - ".github/workflows/move-images.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  move-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Move images to catalog path
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p CatalogoWebLimpMixV3/assets/images
          shopt -s nullglob
          for file in images/*.png images/*.jpg images/*.jpeg images/*.webp images/*.ico; do
            mv -f "$file" "CatalogoWebLimpMixV3/assets/images/$(basename "$file")"
          done
          rm -f images/desktop.ini
          rmdir images 2>/dev/null || true
          git rm -f .github/workflows/move-images.yml
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Move imagens para assets/images"
          git push
